workflows:
  android-release:
    name: ToneBoard Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      android_signing:
        - keystore_reference   # Codemagic dashboard'dan eklenecek (debug için gerek yok)

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Build Android APK
        script: |
          flutter build apk --release --no-shrink

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - arslanaytac11@gmail.com   # Codemagic hesabındaki email
        notify:
          success: true
          failure: true
